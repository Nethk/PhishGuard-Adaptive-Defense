<!DOCTYPE html>
<html>
<head><title>PhishGuard Training</title></head>
<body style="background:#0f172a; color:white; text-align:center; font-family:sans-serif; padding:40px;">
    <div style="max-width:600px; margin:auto; background:#1e293b; padding:30px; border-radius:12px; border:1px solid #475569;">
        <p style="color:#38bdf8; font-size:14px;">Question {{ q_num }} of {{ total }} (Level {{ level }})</p>
        <h3 style="color:#f8fafc">{{ q.subject }}</h3>
        <p style="color:#cbd5e1; background:#0f172a; padding:15px; border-radius:6px; text-align:left;">{{ q.body }}</p>
        <p style="color:#f43f5e; font-family:monospace; word-break:break-all;">Link: {{ q.link }}</p>
        
        <form action="/submit_answer" method="POST" style="margin-top:25px;">
            <button type="submit" name="answer" value="phishing" style="background:#ef4444; color:white; padding:12px 25px; border:none; border-radius:6px; margin:5px; cursor:pointer; font-weight:bold;">🚨 Phishing Threat</button>
            <button type="submit" name="answer" value="safe" style="background:#10b981; color:white; padding:12px 25px; border:none; border-radius:6px; margin:5px; cursor:pointer; font-weight:bold;">✅ Legitimate (Safe)</button>
        </form>
    </div>

<form action="/submit_answer" method="POST" onsubmit="logMistakeToBackend()">
    </form>

<script>
// game logic 
function logMistake(type) {
    fetch('/api/log_training_mistake', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ type: type }) 
    });
}
</script>
</body>
</html>
