<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PhishGuard Server Settings</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 25px; width: 320px; background-color: #f9f9f9; }
    h3 { color: #333; margin-top: 0; }
    label { font-size: 13px; font-weight: bold; color: #555; }
    input { width: 100%; padding: 10px; margin-top: 8px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { background-color: #007bff; color: white; padding: 10px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; }
    button:hover { background-color: #0056b3; }
    #status { color: #28a745; margin-top: 12px; font-size: 13px; font-weight: bold; text-align: center;}
  </style>
</head>
<body>

  <h3>🛡️ PhishGuard Config</h3>
  <label for="serverUrl">Today's Ngrok URL:</label>
  <input type="text" id="serverUrl" placeholder="https://xxxxx.ngrok-free.app">
  <button id="saveBtn">Save & Connect</button>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
